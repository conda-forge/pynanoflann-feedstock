schema_version: 1

context:
  name: pynanoflann
  version: "0.10.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pynanoflann-${{ version }}.tar.gz
  sha256: 72b64a3da0758f37e95969c283615c75c6d1df5f3d6a87ddba33ea2db0afeeed

build:
  number: 3
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - cmake
    - make
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - scikit-build-core
    - pybind11 >=2.10
    - wheel
    - pip
    - nanoflann
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - pynanoflann
      pip_check: true

about:
  summary: python wrapper for nanoflann
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/u1234x1234/pynanoflann

extra:
  recipe-maintainers:
    - jan-janssen
